# Настройки для управления и конфигурации бэкенда Firebase App Hosting.
# Подробнее: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Минимальное и максимальное количество инстансов
  minInstances: 0
  maxInstances: 10
  # Объем оперативной памяти для сервера (Next.js требует минимум 512MiB или 1GiB для стабильности)
  memory: 1GiB
  # Количество ядер процессора
  cpu: 1

env:
  # Здесь можно указать статические переменные. 
  # Секретные ключи (API KEY) лучше добавлять через консоль Firebase или Secret Manager.
  - variable: NEXT_PUBLIC_APP_NAME
    value: "BarBerTok Premium"
